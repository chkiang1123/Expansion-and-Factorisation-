<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Battle: Solo & PvP Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            font-family: 'Press Start 2P', monospace; background-color: #2c3e50;
            color: #333; display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }

        #game-container {
            width: 800px; height: 600px; background-color: #f8f8f8;
            border: 8px solid #333; border-radius: 10px; position: relative;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Screens */
        .screen {
            display: none; width: 100%; height: 100%; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(to bottom, #74ebd5, #ACB6E5);
        }
        #main-menu { display: flex; }

        h1 { font-size: 26px; line-height: 1.5; color: #2c3e50; text-shadow: 2px 2px #fff; margin-bottom: 20px;}
        h2 { font-size: 18px; margin-bottom: 20px; }
        
        .btn {
            font-family: 'Press Start 2P', monospace; background-color: #fff;
            border: 4px solid #333; padding: 15px 20px; margin: 10px;
            cursor: pointer; font-size: 14px; transition: transform 0.1s;
        }
        .btn:hover { background-color: #eee; transform: scale(1.05); }

        .char-btn {
            display: flex; flex-direction: column; align-items: center; 
            font-size: 10px; padding: 20px; line-height: 1.5;
        }
        .char-btn span { font-size: 40px; margin-bottom: 10px; }

        .input-box {
            font-family: 'Press Start 2P', monospace; padding: 10px; font-size: 14px;
            border: 4px solid #333; margin-bottom: 10px; text-align: center; width: 250px;
        }

        /* Battle Scene */
        #battle-screen {
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 50%, #d4fc79 50%, #96e6a1 100%);
            position: relative;
        }

        .hud {
            background: #fff; border: 4px solid #333; border-radius: 10px;
            padding: 10px; position: absolute; width: 250px; font-size: 12px;
        }
        .hud-enemy { top: 20px; left: 20px; }
        .hud-player { bottom: 220px; right: 20px; }

        .hp-bar-container {
            width: 100%; height: 15px; background-color: #ccc;
            border: 2px solid #333; margin-top: 5px; border-radius: 5px; overflow: hidden;
        }
        .hp-bar { height: 100%; background-color: #2ecc71; width: 100%; transition: width 0.3s; }
        
        .hp-text { font-size: 10px; margin-top: 5px; text-align: right; color: #555; }

        .sprite { font-size: 100px; position: absolute; transition: transform 0.2s; }
        .sprite-enemy { top: 40px; right: 80px; }
        .sprite-player { bottom: 220px; left: 80px; transform: scaleX(-1); }

        #dialog-box {
            position: absolute; bottom: 0; width: 100%; height: 200px;
            background: #fff; border-top: 6px solid #333; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        #question-area {
            padding: 15px; font-size: 14px; height: 40px;
            border-bottom: 2px solid #ccc; line-height: 1.5;
        }

        #options-area {
            display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr; flex-grow: 1;
        }

        .option-btn {
            font-family: 'Press Start 2P', monospace; background: transparent;
            border: none; border-right: 2px solid #ccc; border-bottom: 2px solid #ccc;
            font-size: 12px; cursor: pointer; padding: 5px; line-height: 1.4;
        }
        .option-btn:hover:not(:disabled) { background-color: #f0f0f0; }
        .option-btn:disabled { color: #888; cursor: not-allowed; }

        /* Timer */
        #timer-container {
            position: absolute; top: 20px; right: 20px; background: #fff;
            border: 4px solid #333; padding: 10px; font-size: 14px; text-align: center;
        }
        #timer-bar { width: 100px; height: 10px; background: #e74c3c; margin-top: 5px; }

        .damage-text {
            position: absolute; font-size: 24px; font-weight: bold; color: red;
            text-shadow: 2px 2px white; opacity: 0; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="main-menu" class="screen">
        <h1>S.2 Math Battle</h1>
        <p style="font-size: 12px; margin-bottom: 30px;">Identities & Factorisation</p>
        <button class="btn" onclick="showScreen('solo-menu')">👤 Solo Play</button>
        <button class="btn" onclick="showScreen('pvp-menu')">⚔️ Multiplayer (PvP)</button>
    </div>

    <div id="char-select-screen" class="screen">
        <h2>Select Your Hero</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
            <button class="btn char-btn" onclick="selectCharacter('🐭', 'Mathachu')"><span>🐭</span>Mathachu</button>
            <button class="btn char-btn" onclick="selectCharacter('🐢', 'Squarerootle')"><span>🐢</span>Squarerootle</button>
            <button class="btn char-btn" onclick="selectCharacter('🦎', 'Charmathend')"><span>🦎</span>Charmathend</button>
            <button class="btn char-btn" onclick="selectCharacter('🐸', 'Bulbasum')"><span>🐸</span>Bulbasum</button>
        </div>
        <button class="btn" style="font-size: 10px;" onclick="showScreen('main-menu')">Back to Menu</button>
    </div>

    <div id="solo-menu" class="screen">
        <h2>Select Solo Difficulty</h2>
        <button class="btn" onclick="prepareGame(() => startSolo('easy'))">Easy (Common Factors)</button>
        <button class="btn" onclick="prepareGame(() => startSolo('medium'))">Medium (Grouping/Diff Sq)</button>
        <button class="btn" onclick="prepareGame(() => startSolo('hard'))">Hard (Perfect Squares)</button>
        <button class="btn" style="margin-top: 30px; font-size: 10px;" onclick="showScreen('main-menu')">Back</button>
    </div>

    <div id="pvp-menu" class="screen">
        <h2>Multiplayer PvP</h2>
        <div style="border: 2px dashed #333; padding: 15px; margin-bottom: 15px;">
            <p style="font-size: 12px; margin-bottom: 10px;">HOST A GAME (Choose Difficulty)</p>
            <button class="btn" style="font-size: 10px;" onclick="prepareGame(() => setupHost('easy'))">Easy</button>
            <button class="btn" style="font-size: 10px;" onclick="prepareGame(() => setupHost('medium'))">Med</button>
            <button class="btn" style="font-size: 10px;" onclick="prepareGame(() => setupHost('hard'))">Hard</button>
        </div>
        <div>
            <p style="font-size: 12px; margin-bottom: 10px;">JOIN A GAME</p>
            <input type="text" id="join-id" class="input-box" placeholder="Enter 6-Digit ID" maxlength="6"><br>
            <button class="btn" onclick="prepareGame(setupJoin)">Join</button>
        </div>
        <p id="connection-status" style="margin-top: 15px; font-size: 12px; color: #e74c3c; line-height: 1.5;"></p>
        <button class="btn" style="margin-top: 10px; font-size: 10px;" onclick="showScreen('main-menu')">Back</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="timer-container">
            <div id="timer-text-display">Time: <span id="time-text">15</span>s</div>
            <div id="timer-bar"></div>
        </div>

        <div class="hud hud-enemy">
            <div id="enemy-name">Wild Algebro</div>
            <div class="hp-bar-container"><div id="enemy-hp" class="hp-bar"></div></div>
            <div id="enemy-hp-text" class="hp-text">200/200</div>
        </div>
        <div class="sprite sprite-enemy" id="enemy-sprite">🦊</div>

        <div class="hud hud-player">
            <div><span id="player-name-display">Mathachu</span> (You)</div>
            <div class="hp-bar-container"><div id="player-hp" class="hp-bar"></div></div>
            <div id="player-hp-text" class="hp-text">200/200</div>
        </div>
        <div class="sprite sprite-player" id="player-sprite">🐭</div>

        <div id="dialog-box">
            <div id="question-area">Get ready...</div>
            <div id="options-area">
                <button class="option-btn" id="opt0" disabled></button>
                <button class="option-btn" id="opt1" disabled></button>
                <button class="option-btn" id="opt2" disabled></button>
                <button class="option-btn" id="opt3" disabled></button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <h1 id="game-over-title">Game Over!</h1>
        <p id="game-over-msg" style="line-height: 1.5; margin-bottom: 20px;"></p>
        <button class="btn" onclick="location.reload()">Return to Menu</button>
    </div>
</div>

<script>
    // --- GLOBAL GAME STATE ---
    let mode = 'solo'; // 'solo' or 'pvp'
    let difficulty = 'easy';
    let maxHP = 200;
    let playerHP = maxHP;
    let enemyHP = maxHP;
    let currentCorrectAnswer = "";
    let turnActive = false;
    
    // Character Data
    let playerName = "Mathachu";
    let playerEmoji = "🐭";
    let pendingAction = null; 

    // Solo Variables
    let timeLimit = 15; 
    let timeLeft = timeLimit;
    let timerInterval;
    let botTimer; 

    // PvP Variables
    let peer = null;
    let conn = null;
    let isHost = false;
    let pvpStartTime = 0;
    let opponentWrong = false;

    // --- UTILITY ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // --- CHARACTER SELECTION LOGIC ---
    function prepareGame(actionFunction) {
        pendingAction = actionFunction;
        showScreen('char-select-screen');
    }

    function selectCharacter(emoji, name) {
        playerEmoji = emoji;
        playerName = name;
        
        document.getElementById('player-sprite').innerText = emoji;
        document.getElementById('player-name-display').innerText = name;

        if(pendingAction) {
            pendingAction();
            pendingAction = null;
        }
    }

    // --- INFINITE MATH GENERATION ALGORITHM ---
    function generateQuestionData() {
        let type = Math.random() < 0.5 ? 'expand' : 'factorise';
        let qText = "", correct = "", wrongs = [];
        let v = ['x', 'y', 'a', 'm', 'k'][rand(0, 4)];
        let sign = Math.random() < 0.5 ? '+' : '-';
        let oppSign = sign === '+' ? '-' : '+';

        if (difficulty === 'easy') {
            // Focus: Common Factors
            let a = rand(2, 9);
            let b = rand(1, 5);
            let c = rand(1, 9);
            while (b === c || (b%2===0 && c%2===0)) { c = rand(1, 9); } // Basic coprime check
            
            let bTerm = b === 1 ? v : `${b}${v}`;
            let abTerm = (a * b) === 1 ? v : `${a * b}${v}`;
            
            if (type === 'expand') {
                qText = `Expand: ${a}(${bTerm} ${sign} ${c})`;
                correct = `${abTerm} ${sign} ${a * c}`;
                wrongs = [
                    `${abTerm} ${sign} ${c}`,
                    `${bTerm} ${sign} ${a * c}`,
                    `${abTerm} ${oppSign} ${a * c}`
                ];
            } else {
                qText = `Factorise: ${abTerm} ${sign} ${a * c}`;
                correct = `${a}(${bTerm} ${sign} ${c})`;
                wrongs = [
                    `${a}(${bTerm} ${oppSign} ${c})`,
                    `${a * b}(${v} ${sign} ${c})`,
                    `${a}(${bTerm} ${sign} ${a * c})`
                ];
            }
        } else if (difficulty === 'medium') {
            // Focus: Difference of Two Squares & Grouping
            let subtype = Math.random() < 0.5 ? 'diff_sq' : 'grouping';
            
            if (subtype === 'diff_sq') {
                let a = rand(1, 6);
                let b = rand(1, 9);
                let aTerm = a === 1 ? v : `${a}${v}`;
                let a2Term = a === 1 ? `${v}²` : `${a * a}${v}²`;
                let b2 = b * b;
                
                if (type === 'expand') {
                    qText = `Expand: (${aTerm} - ${b})(${aTerm} + ${b})`;
                    correct = `${a2Term} - ${b2}`;
                    wrongs = [
                        `${a2Term} + ${b2}`,
                        `${a * 2}${v}² - ${b2}`,
                        `${a2Term} - ${b}`
                    ];
                } else {
                    qText = `Factorise: ${a2Term} - ${b2}`;
                    correct = `(${aTerm} - ${b})(${aTerm} + ${b})`;
                    wrongs = [
                        `(${aTerm} - ${b})²`,
                        `(${aTerm} + ${b})²`,
                        `(${aTerm} - ${b2})(${aTerm} + 1)`
                    ];
                }
            } else {
                // Focus: Grouping
                let v1 = ['x', 'm', 'p'][rand(0, 2)];
                let v2 = ['y', 'n', 'q'][rand(0, 2)];
                let c = rand(1, 7);
                let d = rand(2, 7);
                qText = `Factorise: ${v1}(${v2} + ${c}) ${sign} ${d}(${v2} + ${c})`;
                correct = `(${v1} ${sign} ${d})(${v2} + ${c})`;
                wrongs = [
                    `(${v1} ${oppSign} ${d})(${v2} + ${c})`,
                    `(${v1} ${sign} ${d})(${v2} - ${c})`,
                    `${v1}${d}(${v2} + ${c})`
                ];
            }
        } else { 
            // Focus: Hard (Perfect Squares)
            let a = rand(1, 5);
            let b = rand(1, 9);
            let aTerm = a === 1 ? v : `${a}${v}`;
            let a2Term = a === 1 ? `${v}²` : `${a * a}${v}²`;
            let midTerm = `${2 * a * b}${v}`;
            let b2 = b * b;

            if (type === 'expand') {
                qText = `Expand: (${aTerm} ${sign} ${b})²`;
                correct = `${a2Term} ${sign} ${midTerm} + ${b2}`;
                wrongs = [
                    `${a2Term} + ${b2}`,
                    `${a2Term} ${sign} ${a * b}${v} + ${b2}`,
                    `${a2Term} ${oppSign} ${midTerm} + ${b2}`
                ];
            } else {
                qText = `Factorise: ${a2Term} ${sign} ${midTerm} + ${b2}`;
                correct = `(${aTerm} ${sign} ${b})²`;
                wrongs = [
                    `(${aTerm} ${oppSign} ${b})²`,
                    `(${aTerm} ${sign} ${b2})²`,
                    `(${aTerm} - ${b})(${aTerm} + ${b})`
                ];
            }
        }
        
        // Remove duplicate wrong answers dynamically and fill if needed
        wrongs = [...new Set(wrongs)];
        while(wrongs.length < 3) { wrongs.push("None of the above"); }

        return { q: qText, ans: correct, wrong: wrongs };
    }

    // --- SOLO MODE LOGIC ---
    function startSolo(level) {
        mode = 'solo';
        difficulty = level;
        maxHP = level === 'easy' ? 150 : (level === 'medium' ? 250 : 350);
        playerHP = maxHP; enemyHP = maxHP;
        
        document.getElementById('enemy-name').innerText = `Wild Algebro (Lv.${level.charAt(0).toUpperCase()})`;
        document.getElementById('enemy-sprite').innerText = '🦊';
        document.getElementById('timer-container').style.display = 'block';
        updateHP();
        showScreen('battle-screen');
        nextSoloTurn();
    }

    function nextSoloTurn() {
        clearTimeout(botTimer); 
        
        let qData = generateQuestionData();
        let options = [qData.ans, ...qData.wrong];
        options.sort(() => Math.random() - 0.5);
        renderQuestionUI(qData.q, qData.ans, options);
        
        turnActive = true;
        resetTimer();

        let botDelay = 15000;
        if (difficulty === 'easy') botDelay = rand(10000, 16000); 
        else if (difficulty === 'medium') botDelay = rand(6000, 11000); 
        else if (difficulty === 'hard') botDelay = rand(2500, 7000); 

        botTimer = setTimeout(() => {
            if (!turnActive || mode !== 'solo') return;
            handleBotAnswer();
        }, botDelay);
    }

    function handleBotAnswer() {
        turnActive = false;
        clearInterval(timerInterval);
        disableButtons();
        animateSprite('enemy-sprite');
        
        let dmg = 25; 
        playerHP -= dmg;
        showDamage('player-sprite', dmg);
        
        document.getElementById('question-area').innerText = "Algebro answered first!\nYou took " + dmg + " damage!";
        
        setTimeout(() => { 
            updateHP(); 
            checkWinLoss(); 
        }, 2000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = timeLimit;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            updateTimerUI();
            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                handleSoloTimeout(); 
            }
        }, 100);
    }

    function updateTimerUI() {
        document.getElementById('time-text').innerText = Math.ceil(timeLeft);
        let pct = (timeLeft / timeLimit) * 100;
        document.getElementById('timer-bar').style.width = Math.max(0, pct) + '%';
    }

    function handleSoloTimeout() {
        if(!turnActive) return;
        turnActive = false;
        clearTimeout(botTimer); 
        disableButtons();
        animateSprite('enemy-sprite');
        let dmg = 25; playerHP -= dmg; showDamage('player-sprite', dmg);
        document.getElementById('question-area').innerText = `Time's up! Algebro dealt ${dmg} damage!`;
        setTimeout(() => { updateHP(); checkWinLoss(); }, 1500);
    }

    // --- PVP MODE LOGIC ---
    function updatePvPStatus(msg) { document.getElementById('connection-status').innerText = msg; }

    function setupHost(level) {
        mode = 'pvp'; difficulty = level; isHost = true;
        showScreen('pvp-menu'); 
        updatePvPStatus("Creating Room...");
        
        // Random 6-digit number
        let roomId = Math.floor(100000 + Math.random() * 900000).toString();
        
        peer = new Peer(roomId);
        peer.on('open', (id) => updatePvPStatus(`Room Created!\nYour Room Code: ${id}\nWaiting for opponent...`));
        peer.on('connection', (connection) => { conn = connection; startPvP(); });
        peer.on('error', (err) => updatePvPStatus("Server Error: " + err.type));
    }

    function setupJoin() {
        mode = 'pvp'; isHost = false;
        let joinId = document.getElementById('join-id').value.trim();
        
        if(!joinId || !/^\d{6}$/.test(joinId)) { 
            updatePvPStatus("Please enter a valid 6-digit Code!"); 
            return; 
        }
        
        showScreen('pvp-menu'); 
        updatePvPStatus("Connecting to Room " + joinId + "...");
        
        peer = new Peer();
        peer.on('open', () => { 
            conn = peer.connect(joinId); 
            conn.on('open', () => startPvP());
        });
        peer.on('error', (err) => {
            if (err.type === 'peer-unavailable') updatePvPStatus("Could not find Room " + joinId + ".");
            else updatePvPStatus("Connection Error: " + err.type);
        });
    }

    function startPvP() {
        conn.send({ type: 'init_char', name: playerName, emoji: playerEmoji });

        maxHP = 200; playerHP = maxHP; enemyHP = maxHP; 
        document.getElementById('timer-container').style.display = 'block';
        document.getElementById('timer-text-display').innerText = "PvP RACE!";
        document.getElementById('timer-bar').style.display = 'none';
        
        updateHP();
        showScreen('battle-screen');
        document.getElementById('question-area').innerText = "Connected! Prepare for battle...";
        
        if(isHost) setTimeout(sendPvPQuestion, 2000);

        conn.on('data', (data) => {
            if(data.type === 'init_char') {
                document.getElementById('enemy-name').innerText = data.name;
                document.getElementById('enemy-sprite').innerText = data.emoji;
            }
            else if(data.type === 'question') {
                opponentWrong = false; // Reset stalemate check
                turnActive = true;
                renderQuestionUI(data.qData.q, data.qData.ans, data.options);
            } 
            else if(data.type === 'attack') {
                if(!turnActive && opponentWrong) return; // Ignore if round was already stalemated
                turnActive = false;
                disableButtons();
                animateSprite('enemy-sprite');
                playerHP -= data.amount;
                showDamage('player-sprite', data.amount);
                document.getElementById('question-area').innerText = `Opponent answered faster! Took ${data.amount} damage!`;
                updateHP();
                checkWinLoss();
                
                // If Host survived, Host generates the next question automatically
                if(isHost && playerHP > 0) setTimeout(sendPvPQuestion, 2500);
            }
            else if(data.type === 'wrong') {
                opponentWrong = true;
                if (!turnActive) {
                    // This means BOTH players have gotten it wrong
                    document.getElementById('question-area').innerText = "Both incorrect! Stalemate!\nMoving to next question...";
                    if (isHost && playerHP > 0 && enemyHP > 0) setTimeout(sendPvPQuestion, 3000);
                } else {
                    let textUI = document.getElementById('question-area').innerText;
                    if(!textUI.includes("(Opponent missed!)")) {
                        document.getElementById('question-area').innerText = textUI + "\n(Opponent missed!)";
                    }
                }
            }
        });
    }

    function sendPvPQuestion() {
        if (playerHP <= 0 || enemyHP <= 0) return; // Safety check
        
        let qData = generateQuestionData();
        let options = [qData.ans, ...qData.wrong];
        options.sort(() => Math.random() - 0.5);
        
        conn.send({ type: 'question', qData: qData, options: options });
        
        // Host local setup
        opponentWrong = false; 
        turnActive = true;
        renderQuestionUI(qData.q, qData.ans, options);
    }

    // --- SHARED BATTLE LOGIC ---
    function renderQuestionUI(qText, ans, options) {
        pvpStartTime = Date.now(); // Start internal timer for speed-damage scaling
        document.getElementById('question-area').innerText = qText;
        currentCorrectAnswer = ans;
        for (let i = 0; i < 4; i++) {
            let btn = document.getElementById('opt' + i);
            btn.innerText = options[i];
            btn.disabled = false;
            btn.style.backgroundColor = 'transparent';
            btn.onclick = () => handleAnswerClick(options[i], btn);
        }
    }

    function disableButtons() {
        for (let i = 0; i < 4; i++) document.getElementById('opt' + i).disabled = true;
    }

    function handleAnswerClick(selected, btnElement) {
        if(!turnActive) return;
        clearTimeout(botTimer); 

        if (selected === currentCorrectAnswer) {
            turnActive = false;
            clearInterval(timerInterval);
            disableButtons();
            animateSprite('player-sprite');
            
            let damage = 25;
            if(mode === 'solo') {
                let multiplier = 1 + (timeLeft / timeLimit); 
                damage = Math.floor(20 * multiplier);
            } else {
                // PvP Time Multiplier Calculation (Base 20, max 40 if answered instantly)
                let elapsedSeconds = (Date.now() - pvpStartTime) / 1000;
                let multiplier = 1 + Math.max(0, 15 - Math.min(15, elapsedSeconds)) / 15;
                damage = Math.floor(20 * multiplier);
                conn.send({ type: 'attack', amount: damage });
            }

            enemyHP -= damage;
            showDamage('enemy-sprite', damage);
            document.getElementById('question-area').innerText = `Correct! Dealt ${damage} damage!`;
            
            setTimeout(() => {
                updateHP();
                checkWinLoss();
                
                // If Host answered correctly, host triggers next question
                if(mode === 'pvp' && isHost && enemyHP > 0) setTimeout(sendPvPQuestion, 1500);
            }, 1000);

        } else {
            btnElement.style.backgroundColor = '#ffcccc';
            
            if(mode === 'solo') {
                turnActive = false;
                clearInterval(timerInterval);
                disableButtons();
                animateSprite('enemy-sprite');
                let dmg = 25; playerHP -= dmg;
                showDamage('player-sprite', dmg);
                document.getElementById('question-area').innerText = `Wrong! Correct was:\n${currentCorrectAnswer}`;
                setTimeout(() => { updateHP(); checkWinLoss(); }, 2000);
            } else {
                // PvP Incorrect Guess Logic (One attempt only)
                turnActive = false;
                disableButtons(); // Lock out the player from guessing again
                
                if (opponentWrong) {
                    document.getElementById('question-area').innerText = "Both incorrect! Stalemate!\nMoving to next question...";
                    if (isHost && playerHP > 0 && enemyHP > 0) setTimeout(sendPvPQuestion, 3000);
                } else {
                    conn.send({ type: 'wrong' });
                    document.getElementById('question-area').innerText = "Incorrect! Waiting for opponent...";
                }
            }
        }
    }

    function updateHP() {
        if(playerHP < 0) playerHP = 0; if(enemyHP < 0) enemyHP = 0;
        let pPct = (playerHP / maxHP) * 100; let ePct = (enemyHP / maxHP) * 100;
        
        document.getElementById('player-hp').style.width = pPct + '%';
        document.getElementById('enemy-hp').style.width = ePct + '%';
        
        let getCol = (pct) => pct > 50 ? '#2ecc71' : (pct > 20 ? '#f1c40f' : '#e74c3c');
        document.getElementById('player-hp').style.backgroundColor = getCol(pPct);
        document.getElementById('enemy-hp').style.backgroundColor = getCol(ePct);

        document.getElementById('player-hp-text').innerText = playerHP + " / " + maxHP;
        document.getElementById('enemy-hp-text').innerText = enemyHP + " / " + maxHP;
    }

    function checkWinLoss() {
        if (playerHP <= 0) endGame(false);
        else if (enemyHP <= 0) endGame(true);
        else if (mode === 'solo' && !turnActive) nextSoloTurn();
    }

    function endGame(playerWon) {
        clearInterval(timerInterval);
        clearTimeout(botTimer); 
        showScreen('game-over-screen');
        let title = document.getElementById('game-over-title');
        let msg = document.getElementById('game-over-msg');
        
        if (playerWon) {
            title.innerText = "VICTORY!"; title.style.color = "#2ecc71";
            msg.innerText = mode === 'solo' ? `Your ${playerName} successfully factorised your way to victory!` : "You outsmarted your opponent!";
        } else {
            title.innerText = "DEFEAT..."; title.style.color = "#e74c3c";
            msg.innerText = mode === 'solo' ? `${playerName} fainted! Keep practicing!` : "Your opponent defeated you!";
        }
    }

    // --- ANIMATIONS ---
    function animateSprite(id) {
        let el = document.getElementById(id);
        let orig = el.style.transform;
        if(id === 'player-sprite') el.style.transform = 'scaleX(-1) translateX(-30px)';
        else el.style.transform = 'translateX(-30px)';
        setTimeout(() => { el.style.transform = orig || (id === 'player-sprite' ? 'scaleX(-1)' : 'none'); }, 150);
    }

    function showDamage(targetId, amount) {
        let target = document.getElementById(targetId);
        let dmg = document.createElement('div');
        dmg.className = 'damage-text'; dmg.innerText = "-" + amount;
        dmg.style.top = (target.offsetTop + 20) + 'px';
        dmg.style.left = (target.offsetLeft + 20) + 'px';
        document.getElementById('battle-screen').appendChild(dmg);
        
        let start = Date.now();
        let anim = setInterval(() => {
            let passed = Date.now() - start;
            if (passed > 1000) { clearInterval(anim); dmg.remove(); }
            else {
                dmg.style.opacity = 1 - (passed / 1000);
                dmg.style.top = (target.offsetTop + 20 - (passed / 20)) + 'px';
            }
        }, 20);
    }
</script>
</body>
</html>
