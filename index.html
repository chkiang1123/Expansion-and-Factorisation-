<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Battle: Solo & PvP Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            font-family: 'Press Start 2P', monospace; background-color: #2c3e50;
            color: #333; display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }

        #game-container {
            width: 800px; height: 600px; background-color: #f8f8f8;
            border: 8px solid #333; border-radius: 10px; position: relative;
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; width: 100%; height: 100%; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(to bottom, #74ebd5, #ACB6E5);
        }
        #main-menu { display: flex; }

        h1 { font-size: 26px; line-height: 1.5; color: #2c3e50; text-shadow: 2px 2px #fff; margin-bottom: 20px;}
        h2 { font-size: 18px; margin-bottom: 20px; color: #2c3e50; }
        
        .btn {
            font-family: 'Press Start 2P', monospace; background-color: #fff;
            border: 4px solid #333; padding: 15px 20px; margin: 10px;
            cursor: pointer; font-size: 14px; transition: transform 0.1s;
        }
        .btn:hover { background-color: #eee; transform: scale(1.05); }

        .input-box {
            font-family: 'Press Start 2P', monospace; padding: 10px; font-size: 14px;
            border: 4px solid #333; margin-bottom: 10px; text-align: center; width: 250px;
        }

        #battle-screen {
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 50%, #d4fc79 50%, #96e6a1 100%);
            position: relative;
        }

        .hud {
            background: #fff; border: 4px solid #333; border-radius: 10px;
            padding: 10px; position: absolute; width: 250px; font-size: 12px;
        }
        .hud-enemy { top: 20px; left: 20px; }
        .hud-player { bottom: 220px; right: 20px; }

        .hp-bar-container {
            width: 100%; height: 18px; background-color: #ccc;
            border: 2px solid #333; margin-top: 5px; border-radius: 5px; 
            overflow: hidden; position: relative;
        }
        .hp-bar { height: 100%; background-color: #2ecc71; width: 100%; transition: width 0.3s; }
        
        /* New Numerical HP Text */
        .hp-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            text-align: center; font-size: 10px; line-height: 18px;
            color: #fff; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            z-index: 2;
        }

        .sprite { font-size: 100px; position: absolute; transition: transform 0.2s; }
        .sprite-enemy { top: 40px; right: 80px; }
        .sprite-player { bottom: 220px; left: 80px; transform: scaleX(-1); }

        #dialog-box {
            position: absolute; bottom: 0; width: 100%; height: 200px;
            background: #fff; border-top: 6px solid #333; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        #question-area {
            padding: 15px; font-size: 12px; height: 50px;
            border-bottom: 2px solid #ccc; line-height: 1.5;
        }

        #options-area {
            display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr; flex-grow: 1;
        }

        .option-btn {
            font-family: 'Press Start 2P', monospace; background: transparent;
            border: none; border-right: 2px solid #ccc; border-bottom: 2px solid #ccc;
            font-size: 11px; cursor: pointer; padding: 5px; line-height: 1.4;
        }
        .option-btn:hover:not(:disabled) { background-color: #f0f0f0; }
        .option-btn:disabled { color: #888; cursor: not-allowed; }

        #timer-container {
            position: absolute; top: 20px; right: 20px; background: #fff;
            border: 4px solid #333; padding: 10px; font-size: 14px; text-align: center;
        }
        #timer-bar { width: 100px; height: 10px; background: #e74c3c; margin-top: 5px; transition: width 0.1s linear; }

        .damage-text {
            position: absolute; font-size: 24px; font-weight: bold; color: red;
            text-shadow: 2px 2px white; opacity: 0; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="main-menu" class="screen">
        <h1>S.2 Math Battle</h1>
        <p style="font-size: 12px; margin-bottom: 30px;">Identities & Factorisation</p>
        <button class="btn" onclick="showScreen('solo-menu')">👤 Solo Play</button>
        <button class="btn" onclick="showScreen('pvp-menu')">⚔️ Multiplayer (PvP)</button>
    </div>

    <div id="solo-menu" class="screen">
        <h2>Select Solo Difficulty</h2>
        <button class="btn" onclick="startSolo('easy')">Easy (Common Factors)</button>
        <button class="btn" onclick="startSolo('medium')">Medium (Grouping/Diff Sq)</button>
        <button class="btn" onclick="startSolo('hard')">Hard (Perfect Squares)</button>
        <button class="btn" style="margin-top: 30px; font-size: 10px;" onclick="showScreen('main-menu')">Back</button>
    </div>

    <div id="pvp-menu" class="screen">
        <h2>Multiplayer PvP</h2>
        <div style="border: 2px dashed #333; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.5);">
            <p style="font-size: 12px; margin-bottom: 10px; font-weight:bold;">HOST A GAME</p>
            <button class="btn" style="font-size: 10px;" onclick="setupHost('easy')">Easy</button>
            <button class="btn" style="font-size: 10px;" onclick="setupHost('medium')">Med</button>
            <button class="btn" style="font-size: 10px;" onclick="setupHost('hard')">Hard</button>
        </div>
        <div style="border: 2px dashed #333; padding: 15px; background: rgba(255,255,255,0.5);">
            <p style="font-size: 12px; margin-bottom: 10px; font-weight:bold;">JOIN A GAME</p>
            <input type="text" id="join-id" class="input-box" placeholder="Enter Room ID"><br>
            <button class="btn" onclick="setupJoin()">Join</button>
        </div>
        <p id="connection-status" style="margin-top: 15px; font-size: 12px; color: #e74c3c; line-height: 1.5;"></p>
        <button class="btn" style="margin-top: 10px; font-size: 10px;" onclick="showScreen('main-menu')">Back</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="timer-container">
            <div id="timer-text-display">Time: <span id="time-text">15</span>s</div>
            <div id="timer-bar"></div>
        </div>

        <div class="hud hud-enemy">
            <div id="enemy-name">Wild Algebro</div>
            <div class="hp-bar-container">
                <div id="enemy-hp-text" class="hp-text">200 / 200</div>
                <div id="enemy-hp" class="hp-bar"></div>
            </div>
        </div>
        <div class="sprite sprite-enemy" id="enemy-sprite">🦊</div>

        <div class="hud hud-player">
            <div>Mathachu (You)</div>
            <div class="hp-bar-container">
                <div id="player-hp-text" class="hp-text">200 / 200</div>
                <div id="player-hp" class="hp-bar"></div>
            </div>
        </div>
        <div class="sprite sprite-player" id="player-sprite">🐭</div>

        <div id="dialog-box">
            <div id="question-area">Get ready...</div>
            <div id="options-area">
                <button class="option-btn" id="opt0" disabled></button>
                <button class="option-btn" id="opt1" disabled></button>
                <button class="option-btn" id="opt2" disabled></button>
                <button class="option-btn" id="opt3" disabled></button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <h1 id="game-over-title">Game Over!</h1>
        <p id="game-over-msg" style="line-height: 1.5; margin-bottom: 20px;"></p>
        <button class="btn" onclick="location.reload()">Return to Menu</button>
    </div>
</div>

<script>
    // --- GLOBAL GAME STATE ---
    let mode = 'solo'; 
    let difficulty = 'easy';
    let maxHP = 200;
    let playerHP = maxHP;
    let enemyHP = maxHP;
    let currentCorrectAnswer = "";
    
    // Turn State Machine
    let turnActive = false;
    let myStatus = 'pending'; // 'pending', 'correct', 'wrong'
    let opponentStatus = 'pending'; 

    // Timer Variables
    let timeLimit = 15; 
    let timeLeft = timeLimit;
    let timerInterval;

    // PvP Variables
    let peer = null;
    let conn = null;
    let isHost = false;

    const peerConfig = {
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    };

    // --- UTILITY ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // --- MATH GENERATOR ---
    function generateQuestionData() {
        let type = Math.random() < 0.5 ? 'expand' : 'factorise';
        let qText = "", correct = "", wrongs = [];

        if (difficulty === 'easy') {
            let a = rand(2, 6); let b = rand(2, 5); let c = rand(2, 7);
            let sign = Math.random() < 0.5 ? '+' : '-';
            let v1 = Math.random() < 0.5 ? 'x' : 'y';
            if (type === 'expand') {
                qText = `Expand: ${a}(${b}${v1} ${sign} ${c})`;
                correct = `${a*b}${v1} ${sign} ${a*c}`;
                wrongs = [`${a*b}${v1} ${sign} ${c}`, `${b}${v1} ${sign} ${a*c}`, `${a*b}${v1} ${sign === '+' ? '-' : '+'} ${a*c}`];
            } else {
                qText = `Factorise: ${a*b}${v1} ${sign} ${a*c}`;
                correct = `${a}(${b}${v1} ${sign} ${c})`;
                wrongs = [`${a}(${b}${v1} ${sign === '+' ? '-' : '+'} ${c})`, `${a*b}(${v1} ${sign} ${c})`, `${a}(${b}${v1} ${sign} ${a*c})`];
            }
        } else if (difficulty === 'medium') {
            if (Math.random() < 0.5) {
                let a = rand(2, 5);
                if (type === 'expand') {
                    qText = `Factorise: a(x + y) + b(x + y)`; 
                    correct = `(a + b)(x + y)`;
                    wrongs = [`(ab)(x + y)`, `(a + b)(xy)`, `a + b + x + y`];
                } else {
                    qText = `Factorise: x(y + ${a}) + 2(y + ${a})`;
                    correct = `(x + 2)(y + ${a})`;
                    wrongs = [`(x - 2)(y + ${a})`, `2x(y + ${a})`, `(x + 2)(y - ${a})`];
                }
            } else {
                let a = rand(1, 4); let b = rand(2, 6);
                let aTerm = a === 1 ? 'x' : `${a}x`; let a2 = a === 1 ? '' : `${a*a}`;
                if (type === 'expand') {
                    qText = `Expand: (${aTerm} - ${b})(${aTerm} + ${b})`;
                    correct = `${a2}x² - ${b*b}`;
                    wrongs = [`${a2}x² + ${b*b}`, `${a2}x² - ${b}`, `${a*2}x² - ${b*b}`];
                } else {
                    qText = `Factorise: ${a2}x² - ${b*b}`;
                    correct = `(${aTerm} - ${b})(${aTerm} + ${b})`;
                    wrongs = [`(${aTerm} - ${b})²`, `(${aTerm} + ${b})²`, `(${aTerm} - ${b*b})(${aTerm} + 1)`];
                }
            }
        } else {
            let a = rand(1, 3); let b = rand(1, 5); let sign = Math.random() < 0.5 ? '+' : '-';
            let aTerm = a === 1 ? 'x' : `${a}x`; let a2 = a === 1 ? '' : `${a*a}`;
            if (type === 'expand') {
                qText = `Expand: (${aTerm} ${sign} ${b})²`;
                correct = `${a2}x² ${sign} ${2*a*b}x + ${b*b}`;
                wrongs = [`${a2}x² + ${b*b}`, `${a2}x² ${sign === '+' ? '-' : '+'} ${2*a*b}x + ${b*b}`, `${a2}x² ${sign} ${a*b}x + ${b*b}`];
            } else {
                qText = `Factorise: ${a2}x² ${sign} ${2*a*b}x + ${b*b}`;
                correct = `(${aTerm} ${sign} ${b})²`;
                wrongs = [`(${aTerm} ${sign === '+' ? '-' : '+'} ${b})²`, `(${aTerm} ${sign} ${b*b})²`, `(${aTerm} - ${b})(${aTerm} + ${b})`];
            }
        }
        return { q: qText, ans: correct, wrong: wrongs };
    }

    // --- SHARED TIMER LOGIC ---
    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = timeLimit;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            updateTimerUI();
            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                handleTimeout(); 
            }
        }, 100);
    }

    function updateTimerUI() {
        document.getElementById('time-text').innerText = Math.ceil(timeLeft);
        let pct = (timeLeft / timeLimit) * 100;
        document.getElementById('timer-bar').style.width = Math.max(0, pct) + '%';
    }

    function handleTimeout() {
        if (!turnActive) return;
        turnActive = false;
        disableButtons();
        
        let message = "Time's up!";
        
        // Timeout penalty applies ONLY if you haven't guessed yet
        if (mode === 'solo') {
            if (myStatus === 'pending') {
                animateSprite('enemy-sprite');
                playerHP -= 25;
                showDamage('player-sprite', 25);
                message = "Time's up! You took 25 damage!";
            }
        } else {
            let pDmg = 0; let eDmg = 0;
            if (myStatus === 'pending') pDmg = 25;
            if (opponentStatus === 'pending') eDmg = 25;
            
            if (pDmg > 0) {
                animateSprite('enemy-sprite');
                playerHP -= pDmg; showDamage('player-sprite', pDmg);
            }
            if (eDmg > 0) {
                animateSprite('player-sprite');
                enemyHP -= eDmg; showDamage('enemy-sprite', eDmg);
            }
            
            if (pDmg > 0 && eDmg > 0) message = "Time's up! Both failed and took damage!";
            else if (pDmg > 0) message = "Time's up! You failed to answer and took damage!";
            else if (eDmg > 0) message = "Time's up! Opponent took damage!";
            else message = "Time's up! Next round.";
        }

        document.getElementById('question-area').innerText = message;
        
        setTimeout(() => { 
            updateHP(); 
            let gameEnded = checkWinLoss();
            if (!gameEnded) {
                if (mode === 'solo') nextSoloTurn();
                else if (mode === 'pvp' && isHost) setTimeout(sendPvPQuestion, 1500);
            }
        }, 1500);
    }

    function handleBothWrong() {
        turnActive = false;
        clearInterval(timerInterval);
        document.getElementById('question-area').innerText = "Both players missed! No damage dealt.";
        
        setTimeout(() => {
            if(!checkWinLoss() && isHost) setTimeout(sendPvPQuestion, 1500);
        }, 1500);
    }

    // --- SOLO MODE ---
    function startSolo(level) {
        mode = 'solo'; difficulty = level;
        maxHP = level === 'easy' ? 150 : (level === 'medium' ? 250 : 350);
        playerHP = maxHP; enemyHP = maxHP;
        
        document.getElementById('enemy-name').innerText = `Wild Algebro`;
        document.getElementById('timer-container').style.display = 'block';
        document.getElementById('timer-bar').style.display = 'block';
        updateHP(); showScreen('battle-screen');
        nextSoloTurn();
    }

    function nextSoloTurn() {
        let qData = generateQuestionData();
        let options = [qData.ans, ...qData.wrong];
        options.sort(() => Math.random() - 0.5); 
        renderQuestionUI(qData.q, qData.ans, options);
        myStatus = 'pending';
        turnActive = true; 
        resetTimer();
    }

    // --- PVP MODE ---
    function updatePvPStatus(msg) { document.getElementById('connection-status').innerText = msg; }

    function setupHost(level) {
        mode = 'pvp'; difficulty = level; isHost = true;
        updatePvPStatus("Creating Room... Please wait.");
        let roomId = "math-" + Math.random().toString(36).substring(2, 6);
        
        peer = new Peer(roomId, peerConfig);
        peer.on('open', (id) => updatePvPStatus(`Room Created!\nYour Room ID: ${id}\nTell your opponent to enter this!`));
        peer.on('connection', (connection) => { conn = connection; startPvP(); });
        peer.on('error', (err) => updatePvPStatus(`Error: ${err.type}. Check network rules.`));
    }

    function setupJoin() {
        mode = 'pvp'; isHost = false;
        let joinId = document.getElementById('join-id').value.trim().toLowerCase();
        if(!joinId) { updatePvPStatus("Please enter a Room ID!"); return; }
        
        updatePvPStatus("Connecting to " + joinId + "...");
        peer = new Peer(undefined, peerConfig);
        peer.on('open', () => { 
            conn = peer.connect(joinId);
            conn.on('error', (err) => updatePvPStatus(`Connection failed: ${err.message}`));
            startPvP(); 
        });
        peer.on('error', (err) => updatePvPStatus(`Error: ${err.type}. Check Room ID.`));
    }

    function startPvP() {
        conn.on('open', () => {
            maxHP = 200; playerHP = maxHP; enemyHP = maxHP;
            document.getElementById('enemy-name').innerText = "Opponent";
            document.getElementById('timer-container').style.display = 'block';
            document.getElementById('timer-bar').style.display = 'block';
            
            updateHP(); showScreen('battle-screen');
            document.getElementById('question-area').innerText = "Connected! Prepare for battle...";
            
            if(isHost) setTimeout(sendPvPQuestion, 2000);
        });

        conn.on('data', (data) => {
            if(data.type === 'question') {
                myStatus = 'pending';
                opponentStatus = 'pending';
                turnActive = true;
                renderQuestionUI(data.qData.q, data.qData.ans, data.options);
                resetTimer();
            } 
            else if(data.type === 'correct') {
                if(!turnActive) return; 
                turnActive = false;
                opponentStatus = 'correct';
                clearInterval(timerInterval);
                disableButtons(); 
                animateSprite('enemy-sprite'); 
                
                playerHP -= data.amount; 
                showDamage('player-sprite', data.amount);
                document.getElementById('question-area').innerText = `Opponent answered first! You took ${data.amount} damage!`;
                
                setTimeout(() => {
                    updateHP(); 
                    if(!checkWinLoss() && isHost) setTimeout(sendPvPQuestion, 1500);
                }, 1000);
            }
            else if(data.type === 'wrong') {
                opponentStatus = 'wrong';
                // If I am already wrong too, then we both missed!
                if (myStatus === 'wrong' && turnActive) {
                    handleBothWrong();
                }
            }
        });
    }

    function sendPvPQuestion() {
        let qData = generateQuestionData();
        let options = [qData.ans, ...qData.wrong];
        options.sort(() => Math.random() - 0.5);
        
        conn.send({ type: 'question', qData: qData, options: options });
        myStatus = 'pending';
        opponentStatus = 'pending';
        turnActive = true;
        renderQuestionUI(qData.q, qData.ans, options);
        resetTimer();
    }

    // --- ANSWER LOGIC ---
    function renderQuestionUI(qText, ans, options) {
        document.getElementById('question-area').innerText = qText;
        currentCorrectAnswer = ans;
        for (let i = 0; i < 4; i++) {
            let btn = document.getElementById('opt' + i);
            btn.innerText = options[i]; btn.disabled = false;
            btn.style.backgroundColor = 'transparent';
            btn.onclick = () => handleAnswerClick(options[i], btn);
        }
    }

    function disableButtons() {
        for (let i = 0; i < 4; i++) document.getElementById('opt' + i).disabled = true;
    }

    function handleAnswerClick(selected, btnElement) {
        // Can only click if turn is active and haven't guessed yet
        if(!turnActive || myStatus !== 'pending') return;

        if (selected === currentCorrectAnswer) {
            myStatus = 'correct';
            turnActive = false; 
            clearInterval(timerInterval);
            disableButtons(); 
            animateSprite('player-sprite');
            
            let multiplier = 1 + (timeLeft / timeLimit); 
            let damage = Math.floor(20 * multiplier);

            if(mode === 'solo') {
                enemyHP -= damage; 
                showDamage('enemy-sprite', damage);
                document.getElementById('question-area').innerText = `Correct! Dealt ${damage} damage!`;
                
                setTimeout(() => {
                    updateHP(); 
                    if(!checkWinLoss()) nextSoloTurn();
                }, 1000);
            } else {
                conn.send({ type: 'correct', amount: damage }); 
                enemyHP -= damage; 
                showDamage('enemy-sprite', damage);
                document.getElementById('question-area').innerText = `Correct! You answered first! Dealt ${damage} damage!`;
                
                setTimeout(() => {
                    updateHP(); 
                    if(!checkWinLoss() && isHost) setTimeout(sendPvPQuestion, 1500);
                }, 1000);
            }

        } else {
            // Wrong Guess!
            myStatus = 'wrong';
            btnElement.style.backgroundColor = '#ffcccc'; 
            disableButtons();

            if(mode === 'solo') {
                turnActive = false; clearInterval(timerInterval);
                document.getElementById('question-area').innerText = `Incorrect! No damage dealt.\nCorrect was: ${currentCorrectAnswer}`;
                setTimeout(() => { 
                    if (!checkWinLoss()) nextSoloTurn();
                }, 2000);
            } else {
                // PvP: Lock them out and wait for opponent
                conn.send({ type: 'wrong' });
                if (opponentStatus === 'wrong') {
                    // Opponent already guessed wrong earlier!
                    handleBothWrong();
                } else {
                    document.getElementById('question-area').innerText = "Incorrect! Waiting for opponent to answer...";
                }
            }
        }
    }

    function updateHP() {
        // Prevent negative values
        if(playerHP < 0) playerHP = 0; 
        if(enemyHP < 0) enemyHP = 0;
        
        let pPct = (playerHP / maxHP) * 100; 
        let ePct = (enemyHP / maxHP) * 100;
        
        document.getElementById('player-hp').style.width = pPct + '%';
        document.getElementById('enemy-hp').style.width = ePct + '%';
        
        // Update precise numerical text
        document.getElementById('player-hp-text').innerText = `${Math.floor(playerHP)} / ${maxHP}`;
        document.getElementById('enemy-hp-text').innerText = `${Math.floor(enemyHP)} / ${maxHP}`;
        
        let getCol = (pct) => pct > 50 ? '#2ecc71' : (pct > 20 ? '#f1c40f' : '#e74c3c');
        document.getElementById('player-hp').style.backgroundColor = getCol(pPct);
        document.getElementById('enemy-hp').style.backgroundColor = getCol(ePct);
    }

    function checkWinLoss() {
        if (playerHP <= 0) { endGame(false); return true; }
        else if (enemyHP <= 0) { endGame(true); return true; }
        return false;
    }

    function endGame(playerWon) {
        clearInterval(timerInterval); 
        showScreen('game-over-screen');
        let title = document.getElementById('game-over-title');
        let msg = document.getElementById('game-over-msg');
        
        if (playerWon) {
            title.innerText = "VICTORY!"; title.style.color = "#2ecc71";
            msg.innerText = mode === 'solo' ? "You successfully factorised your way to victory!" : "You outsmarted your opponent!";
        } else {
            title.innerText = "DEFEAT..."; title.style.color = "#e74c3c";
            msg.innerText = mode === 'solo' ? "Mathachu fainted! Keep practicing!" : "Your opponent defeated you!";
        }
    }

    // --- ANIMATIONS ---
    function animateSprite(id) {
        let el = document.getElementById(id); let orig = el.style.transform;
        if(id === 'player-sprite') el.style.transform = 'scaleX(-1) translateX(-30px)';
        else el.style.transform = 'translateX(-30px)';
        setTimeout(() => { el.style.transform = orig || (id === 'player-sprite' ? 'scaleX(-1)' : 'none'); }, 150);
    }

    function showDamage(targetId, amount) {
        let target = document.getElementById(targetId);
        let dmg = document.createElement('div');
        dmg.className = 'damage-text'; dmg.innerText = "-" + amount;
        dmg.style.top = (target.offsetTop + 20) + 'px';
        dmg.style.left = (target.offsetLeft + 20) + 'px';
        document.getElementById('battle-screen').appendChild(dmg);
        
        let start = Date.now();
        let anim = setInterval(() => {
            let passed = Date.now() - start;
            if (passed > 1000) { clearInterval(anim); dmg.remove(); }
            else {
                dmg.style.opacity = 1 - (passed / 1000);
                dmg.style.top = (target.offsetTop + 20 - (passed / 20)) + 'px';
            }
        }, 20);
    }
</script>
</body>
</html>
